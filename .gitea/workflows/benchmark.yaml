name: Benchmark & Deploy
run-name: OpenBenchmark ${{ github.sha }}

on:
  schedule:
    - cron: '0 * * * *'        # 每小时
  push:
    branches: [main]
    paths-ignore:
      - 'data/results.ndjson'  # 数据回提交不触发本工作流, 避免死循环
  workflow_dispatch:

concurrency:
  group: benchmark-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (需写权限以回提交数据)
        uses: actions/checkout@v4
        with:
          # 使用 Gitea Actions 内置 job token 回提交数据, 无需额外 PAT。
          token: ${{ secrets.GITEA_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 无运行时依赖, 无需 npm install。

      - name: Run benchmark (追加 data/results.ndjson)
        run: node benchmark.js
        env:
          OPENCODE_GO_KEY: ${{ secrets.OPENCODE_GO_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          CHATGPT_FREE_KEY: ${{ secrets.CHATGPT_FREE_KEY }}
          CHATGPT_PLUS_FAST_KEY: ${{ secrets.CHATGPT_PLUS_FAST_KEY }}
          CHATGPT_PLUS_KEY: ${{ secrets.CHATGPT_PLUS_KEY }}
          CHATGPT_PRO_KEY: ${{ secrets.CHATGPT_PRO_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_AWS_API_KEY: ${{ secrets.CLAUDE_AWS_API_KEY }}
          CLAUDE_WS_API_KEY: ${{ secrets.CLAUDE_WS_API_KEY }}
          CLAUDE_MAX_API_KEY: ${{ secrets.CLAUDE_MAX_API_KEY }}
          RETENTION_DAYS: '30'

      - name: Commit updated data
        run: |
          git config user.name "benchmark-bot"
          git config user.email "benchmark-bot@openbenchmark.local"
          git add data/results.ndjson
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: benchmark run [skip ci]"
            git push
          fi

      - name: Build static site
        run: node build.js

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT=$(node -p "(require('fs').readFileSync('wrangler.toml','utf8').match(/name\s*=\s*[\"']([^\"']+)[\"']/)||[])[1]||'openbenchmark'")
          echo "Pages project: $PROJECT"
          npx --yes wrangler@4 pages project create "$PROJECT" --production-branch=main 2>/dev/null || true
          npx --yes wrangler@4 pages deploy dist --project-name="$PROJECT" --branch=main --commit-dirty=true
